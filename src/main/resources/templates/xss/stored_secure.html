<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div})}">

<body>
    <div>
        <h1>Stored XSS (Secure)</h1>

        <div class="mission-grid" style="grid-template-columns: 1fr 1fr;">
            <!-- Post Form -->
            <div class="card" style="border-color: var(--accent-green);">
                <h4>📋 The Clean Board</h4>
                <div
                    style="background: rgba(0, 255, 0, 0.05); border: 1px solid var(--accent-green); padding: 10px; margin-bottom: 15px; border-radius: 4px;">
                    <strong class="text-green">✅ SANITIZATION: ACTIVE</strong>
                    <p class="text-secondary" style="margin: 5px 0 0; font-size: 0.9rem;">"Your scripts are useless
                        here. We render everything as harmless text."</p>
                </div>

                <form th:action="@{/secure/xss/stored/add}" method="post">
                    <div style="margin-bottom: 10px;">
                        <label>Author Name:</label>
                        <input type="text" name="name" placeholder="John Doe" required />
                    </div>

                    <label>Note Content:</label>
                    <div style="display: flex; gap: 10px; align-items: flex-start;">
                        <textarea name="notes" rows="3" placeholder="Safe note content" style="flex: 1;"></textarea>
                    </div>

                    <div style="margin-top: 10px; display: flex; gap: 5px;">
                        <button type="submit" class="btn btn-primary">Post Note</button>
                        <button type="button" class="btn"
                            style="background: rgba(0, 243, 255, 0.2); color: var(--accent-cyan); border: 1px solid var(--accent-cyan);"
                            onclick="runDemo('name', 'Tester'); runDemoAndSubmit('notes', `<script>alert('This will fail')</script>`)">Test
                            Shield</button>
                    </div>
                </form>
            </div>

            <!-- The Board -->
            <div class="card" style="background: #001; border: 1px solid var(--accent-green); min-height: 300px;">
                <h5 class="text-green">📌 PUBLIC NOTICE BOARD</h5>
                <p class="text-secondary" style="font-size: 0.8rem; margin-bottom: 10px;">(All input escaped)</p>

                <div th:each="s : ${students}"
                    style="background: rgba(0, 50, 0, 0.3); padding: 10px; margin-bottom: 10px; border-radius: 4px; border-left: 3px solid var(--accent-green);">
                    <div style="font-size: 0.8rem; color: var(--accent-cyan); margin-bottom: 5px; font-weight: bold;">
                        <span th:text="${s.firstName} + ' ' + ${s.lastName}"></span>
                    </div>
                    <!-- The Fix: text escapes HTML tags -->
                    <div th:text="${s.notes}"
                        style="color: #ccc; font-family: var(--font-mono); word-break: break-word;"></div>
                </div>

                <div th:if="${#lists.isEmpty(students)}" style="text-align: center; opacity: 0.3; padding: 40px;">
                    (No notices posted)
                </div>
            </div>
        </div>
    </div>
</body>

</html>
