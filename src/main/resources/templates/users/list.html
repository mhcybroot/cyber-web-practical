<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div})}">

<body>
    <div>
        <div class="flex-between" style="margin-bottom: 20px;">
            <h1>User Management</h1>
            <a href="/users/add" class="btn btn-primary">+ Add New User</a>
        </div>

        <div class="card">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="border-bottom: 1px solid var(--border-color); text-align: left;">
                        <th style="padding: 15px; color: var(--text-secondary);">ID</th>
                        <th style="padding: 15px; color: var(--text-secondary);">Username</th>
                        <th style="padding: 15px; color: var(--text-secondary);">Role</th>
                        <th style="padding: 15px; color: var(--text-secondary);">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}" style="border-bottom: 1px solid rgba(42, 44, 61, 0.5);">
                        <td style="padding: 15px; font-family: var(--font-mono);" th:text="${user.id}"></td>
                        <td style="padding: 15px; font-weight: bold; color: var(--text-primary);"
                            th:text="${user.username}"></td>
                        <td style="padding: 15px;">
                            <span class="badge" th:classappend="${user.role == 'ADMIN'} ? 'badge-vuln' : 'badge-secure'"
                                th:text="${user.role}">Role</span>
                        </td>
                        <td style="padding: 15px;">
                            <a th:href="@{/users/edit/{id}(id=${user.id})}" class="text-cyan"
                                style="margin-right: 15px;">Edit</a>
                            <a th:href="@{/users/delete/{id}(id=${user.id})}" class="text-red"
                                onclick="return confirm('Are you sure you want to delete this user?')">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
